name: CI tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: tioj-judge CI Tests
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get -yqq install git g++ cmake ninja-build \
            libseccomp-dev libnl-genl-3-dev libsqlite3-dev libz-dev libssl-dev \
            libboost-all-dev libzstd-dev \
            ghc python2 python3 python3-numpy python3-pil

      - name: Compile
        run: |
          mkdir build
          cd build
          cmake -G Ninja ..
          ninja

      - name: Run tests
        run: |
          sudo ./build/judge-test
